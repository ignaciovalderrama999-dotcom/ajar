<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14">
  <rect width="820" height="470" rx="10" fill="#0d1117"/>
  <rect width="820" height="34" rx="10" fill="#161b22"/>
  <rect y="24" width="820" height="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="410" y="22" fill="#8b949e" text-anchor="middle" font-size="12">ajar — security scan</text>

  <text xml:space="preserve" x="20" y="62" fill="#c9d1d9"><tspan fill="#27c93f">$</tspan> ajar scan .</text>

  <text x="20" y="92" fill="#e6edf3" font-weight="bold">ajar</text>
  <text x="70" y="92" fill="#6e7681">the door you left open by default</text>

  <!-- finding 1 -->
  <rect x="20" y="108" width="86" height="20" rx="3" fill="#bc4fd6"/>
  <text x="30" y="123" fill="#0d1117" font-weight="bold">CRITICAL</text>
  <text x="116" y="123" fill="#e6edf3" font-weight="bold">app/auth.py:14</text>
  <text x="40" y="145" fill="#c9d1d9">Auth disabled outside production  <tspan fill="#6e7681">[FAILOPEN_AUTH_ENV_BYPASS]</tspan></text>
  <text x="40" y="164" fill="#8b949e"><tspan fill="#e6edf3" font-weight="bold">why </tspan>a missing env var boots the app with no authentication.</text>
  <text x="40" y="183" fill="#8b949e"><tspan fill="#e6edf3" font-weight="bold">fix </tspan>fail closed — default auth ON, require an explicit opt-out.</text>

  <!-- finding 2 -->
  <rect x="20" y="199" width="86" height="20" rx="3" fill="#f85149"/>
  <text x="42" y="214" fill="#0d1117" font-weight="bold">HIGH</text>
  <text x="116" y="214" fill="#e6edf3" font-weight="bold">app/db.py:31</text>
  <text x="40" y="236" fill="#c9d1d9">SQL query built with an f-string  <tspan fill="#6e7681">[SQLI_FSTRING]</tspan></text>
  <text x="40" y="255" fill="#8b949e"><tspan fill="#e6edf3" font-weight="bold">why </tspan>user input spliced into SQL lets an attacker rewrite the query.</text>
  <text x="40" y="274" fill="#8b949e"><tspan fill="#e6edf3" font-weight="bold">fix </tspan>use parameterized queries with placeholders.</text>

  <!-- finding 3 -->
  <rect x="20" y="290" width="86" height="20" rx="3" fill="#f0b429"/>
  <text x="34" y="305" fill="#0d1117" font-weight="bold">MEDIUM</text>
  <text x="116" y="305" fill="#e6edf3" font-weight="bold">app/net.py:8</text>
  <text x="40" y="327" fill="#c9d1d9">Outbound HTTP call without a timeout  <tspan fill="#6e7681">[DOS_NO_REQUEST_TIMEOUT]</tspan></text>
  <text x="40" y="346" fill="#8b949e"><tspan fill="#e6edf3" font-weight="bold">why </tspan>a hung request ties up a worker; enough of them deny service.</text>
  <text x="40" y="365" fill="#8b949e"><tspan fill="#e6edf3" font-weight="bold">fix </tspan>always pass an explicit timeout.</text>

  <line x1="20" y1="392" x2="800" y2="392" stroke="#21262d"/>
  <text x="20" y="420" fill="#e6edf3" font-weight="bold">Found 9 open doors:
    <tspan fill="#bc4fd6"> 2 critical</tspan><tspan fill="#6e7681"> · </tspan><tspan fill="#f85149">6 high</tspan><tspan fill="#6e7681"> · </tspan><tspan fill="#f0b429">1 medium</tspan>
  </text>
  <text x="20" y="446" fill="#6e7681" font-size="12">defensive aid, not a guarantee · scan only code you own · 100% local, no telemetry</text>
</svg>
