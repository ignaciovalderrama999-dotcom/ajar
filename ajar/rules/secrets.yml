# secrets rules — hardcoded credentials. Baseline coverage so ajar is useful
# on day one, but the differentiator lives in the fail-open category.
rules:
  - id: SECRET_GITHUB_TOKEN
    name: Hardcoded GitHub token
    severity: critical
    category: secrets
    message: A GitHub personal access / OAuth token appears to be hardcoded.
    pattern: '(gh[opusr]_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{40,})'
    why: >
      A leaked GitHub token grants API access to repositories and org resources.
      Bots scrape public code for this exact pattern within minutes.
    fix: >
      Revoke and regenerate the token immediately; load it from the environment
      or a secrets manager.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_GOOGLE_API_KEY
    name: Hardcoded Google API key
    severity: high
    category: secrets
    message: A Google API key appears to be hardcoded.
    pattern: 'AIza[0-9A-Za-z_\-]{35}'
    why: >
      A committed Google API key can be abused to run up billing or access
      enabled services on your project.
    fix: >
      Restrict, rotate, and move the key out of source into environment config.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_STRIPE_KEY
    name: Hardcoded Stripe live key
    severity: critical
    category: secrets
    message: A live Stripe secret key appears to be hardcoded.
    pattern: '(sk|rk)_live_[0-9A-Za-z]{20,}'
    why: >
      A live Stripe secret key can move real money and read customer/payment
      data. This is one of the highest-impact secrets to leak.
    fix: >
      Roll the key in the Stripe dashboard now and load it only server-side from
      a secret store.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_LLM_API_KEY
    name: Hardcoded AI/LLM API key
    severity: high
    category: secrets
    message: An OpenAI/Anthropic-style API key appears to be hardcoded.
    pattern: 'sk-(ant-)?[A-Za-z0-9_\-]{20,}'
    why: >
      A leaked LLM API key lets anyone spend against your account and access
      your usage. These keys are actively scraped from public repos.
    fix: >
      Revoke and rotate the key; read it from the environment, never commit it.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_AWS_ACCESS_KEY
    name: Hardcoded AWS access key
    severity: critical
    category: secrets
    message: An AWS access key ID appears to be hardcoded.
    pattern: 'AKIA[0-9A-Z]{16}'
    why: >
      A committed AWS key grants direct API access to the account. Bots scrape
      public repos for exactly this pattern within minutes of a push.
    fix: >
      Revoke the key immediately, rotate it, and load credentials from the
      environment or a secrets manager instead.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_PRIVATE_KEY
    name: Private key material
    severity: critical
    category: secrets
    message: A PEM private key block is embedded in source.
    pattern: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
    why: >
      A leaked private key lets an attacker impersonate your service, decrypt
      traffic, or sign malicious artifacts.
    fix: >
      Remove the key, rotate it, and store it in a secrets manager or an
      untracked file referenced by path.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_GENERIC_ASSIGNMENT
    name: Hardcoded credential assignment
    severity: high
    category: secrets
    message: A password/secret/token is assigned a hardcoded literal value.
    pattern: '(?i)(password|passwd|secret|api[_-]?key|token|access[_-]?key)\s*[:=]\s*["''][^"''\s]{6,}["'']'
    why: >
      Hardcoded credentials end up in version history forever, are shared with
      everyone who clones the repo, and cannot be rotated without a code change.
    fix: >
      Load secrets from environment variables or a secrets manager. Never commit
      real credentials — use placeholders in examples.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_SLACK_TOKEN
    name: Hardcoded Slack token
    severity: high
    category: secrets
    message: A Slack token appears to be hardcoded.
    pattern: 'xox[baprs]-[0-9A-Za-z-]{10,}'
    why: >
      A Slack token can read messages, post as your app, and access workspace
      data until it is revoked.
    fix: >
      Revoke and rotate the token; load it from the environment.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_TWILIO_KEY
    name: Hardcoded Twilio credential
    severity: high
    category: secrets
    message: A Twilio Account SID or API Key SID appears to be hardcoded.
    pattern: '\b(AC|SK)[0-9a-fA-F]{32}\b'
    why: >
      A leaked Twilio credential lets an attacker send SMS/calls and access
      messaging data on your account, usually at your expense.
    fix: >
      Revoke and rotate the credential in the Twilio console; load it from the
      environment.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_SENDGRID_KEY
    name: Hardcoded SendGrid API key
    severity: high
    category: secrets
    message: A SendGrid API key appears to be hardcoded.
    pattern: 'SG\.[A-Za-z0-9_\-]{16,32}\.[A-Za-z0-9_\-]{16,64}'
    why: >
      A leaked SendGrid key lets an attacker send email as you (phishing from a
      trusted domain) and read your sending activity.
    fix: >
      Revoke and rotate the key in the SendGrid dashboard; load it from the
      environment.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_NPM_TOKEN
    name: Hardcoded npm publish token
    severity: high
    category: secrets
    message: An npm authentication token appears to be hardcoded.
    pattern: 'npm_[A-Za-z0-9]{36}'
    why: >
      A leaked npm token can be used to publish malicious versions of your
      packages — a supply-chain attack on everyone who installs them.
    fix: >
      Revoke and rotate the token on npmjs.com; load it from the environment
      (e.g. NPM_TOKEN) and never commit .npmrc with a real token.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_DISCORD_BOT_TOKEN
    name: Hardcoded Discord bot token
    severity: high
    category: secrets
    message: A Discord bot token appears to be hardcoded.
    pattern: '[MN][A-Za-z\d]{23,25}\.[A-Za-z\d_-]{6}\.[A-Za-z\d_-]{27,}'
    why: >
      A leaked Discord bot token lets an attacker fully control the bot — read
      messages, impersonate it, and act in every server it has joined.
    fix: >
      Regenerate the token in the Discord developer portal; load it from the
      environment.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_SQUARE_TOKEN
    name: Hardcoded Square access token
    severity: high
    category: secrets
    message: A Square access token appears to be hardcoded.
    pattern: '(sq0atp-[0-9A-Za-z\-_]{22}|EAAA[0-9A-Za-z\-_]{60})'
    why: >
      A leaked Square token can access payment and customer data, or move
      money, on the connected merchant account.
    fix: >
      Revoke and rotate the token in the Square developer dashboard; load it
      from the environment.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_PRIVATE_KEY_URL_CREDS
    name: Credentials embedded in a URL
    severity: medium
    category: secrets
    message: A URL contains an inline username:password.
    pattern: '(?i)[a-z][a-z0-9+.-]*://[^/\s:@]+:[^/\s:@]+@'
    why: >
      Credentials in a URL leak through logs, browser history, referrer
      headers, and process listings.
    fix: >
      Move credentials out of the URL and pass them via a secure config channel.
    references:
      - https://cwe.mitre.org/data/definitions/598.html
