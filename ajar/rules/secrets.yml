# secrets rules — hardcoded credentials. Baseline coverage so ajar is useful
# on day one, but the differentiator lives in the fail-open category.
rules:
  - id: SECRET_AWS_ACCESS_KEY
    name: Hardcoded AWS access key
    severity: critical
    category: secrets
    message: An AWS access key ID appears to be hardcoded.
    pattern: 'AKIA[0-9A-Z]{16}'
    why: >
      A committed AWS key grants direct API access to the account. Bots scrape
      public repos for exactly this pattern within minutes of a push.
    fix: >
      Revoke the key immediately, rotate it, and load credentials from the
      environment or a secrets manager instead.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_PRIVATE_KEY
    name: Private key material
    severity: critical
    category: secrets
    message: A PEM private key block is embedded in source.
    pattern: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
    why: >
      A leaked private key lets an attacker impersonate your service, decrypt
      traffic, or sign malicious artifacts.
    fix: >
      Remove the key, rotate it, and store it in a secrets manager or an
      untracked file referenced by path.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_GENERIC_ASSIGNMENT
    name: Hardcoded credential assignment
    severity: high
    category: secrets
    message: A password/secret/token is assigned a hardcoded literal value.
    pattern: '(?i)(password|passwd|secret|api[_-]?key|token|access[_-]?key)\s*[:=]\s*["''][^"''\s]{6,}["'']'
    why: >
      Hardcoded credentials end up in version history forever, are shared with
      everyone who clones the repo, and cannot be rotated without a code change.
    fix: >
      Load secrets from environment variables or a secrets manager. Never commit
      real credentials — use placeholders in examples.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_SLACK_TOKEN
    name: Hardcoded Slack token
    severity: high
    category: secrets
    message: A Slack token appears to be hardcoded.
    pattern: 'xox[baprs]-[0-9A-Za-z-]{10,}'
    why: >
      A Slack token can read messages, post as your app, and access workspace
      data until it is revoked.
    fix: >
      Revoke and rotate the token; load it from the environment.
    references:
      - https://cwe.mitre.org/data/definitions/798.html

  - id: SECRET_PRIVATE_KEY_URL_CREDS
    name: Credentials embedded in a URL
    severity: medium
    category: secrets
    message: A URL contains an inline username:password.
    pattern: '(?i)[a-z][a-z0-9+.-]*://[^/\s:@]+:[^/\s:@]+@'
    why: >
      Credentials in a URL leak through logs, browser history, referrer
      headers, and process listings.
    fix: >
      Move credentials out of the URL and pass them via a secure config channel.
    references:
      - https://cwe.mitre.org/data/definitions/598.html
