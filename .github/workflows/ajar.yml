# Run ajar on every push and pull request.
# Copy this into your own repo to keep doors closed automatically.
name: ajar

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ajar
        run: pip install .

      - name: Scan for open doors
        run: ajar scan . --fail-on high

      # Optional: upload results to GitHub code scanning (Security tab).
      - name: SARIF report
        if: always()
        run: ajar scan . --format sarif > ajar.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ajar.sarif
